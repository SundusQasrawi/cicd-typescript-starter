name: cd

on:
  push:
    branches: [main]

jobs:
  Deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set project
        run: gcloud config set project qwiklabs-gcp-04-b8b5d25c073e  # ← replace

      - name: Build & Push
        run: |
          gcloud builds submit \
            --tag us-docker.pkg.dev/qwiklabs-gcp-04-b8b5d25c073e/notely-ar-repo/notely:latest .